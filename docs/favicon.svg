<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1517"/>
      <stop offset="100%" stop-color="#0a0e0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4a8"/>
      <stop offset="100%" stop-color="#00a882"/>
    </linearGradient>
    <linearGradient id="glow" x1="32" y1="8" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4a8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4a8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" stroke="#1f2d30" stroke-width="1"/>

  <!-- Database cylinders (stacked) -->
  <!-- Bottom cylinder -->
  <ellipse cx="32" cy="46" rx="14" ry="4" fill="#1a2426" stroke="#243336" stroke-width="1"/>
  <rect x="18" y="38" width="28" height="8" fill="#1a2426"/>
  <ellipse cx="32" cy="38" rx="14" ry="4" fill="#243336" stroke="#2d4043" stroke-width="1"/>

  <!-- Middle cylinder -->
  <ellipse cx="32" cy="36" rx="14" ry="4" fill="#1a2426" stroke="#243336" stroke-width="1"/>
  <rect x="18" y="28" width="28" height="8" fill="#1a2426"/>
  <ellipse cx="32" cy="28" rx="14" ry="4" fill="#243336" stroke="#2d4043" stroke-width="1"/>

  <!-- Top cylinder — accent colored -->
  <ellipse cx="32" cy="26" rx="14" ry="4" fill="#0d2622" stroke="#00a882" stroke-width="1"/>
  <rect x="18" y="18" width="28" height="8" fill="#0d2622"/>
  <ellipse cx="32" cy="18" rx="14" ry="4" fill="url(#accent)" stroke="#00d4a8" stroke-width="0.5"/>

  <!-- Spark / AI symbol top right -->
  <g transform="translate(42, 10)">
    <!-- Star/spark shape -->
    <path d="M6 0 L7.2 4.8 L12 6 L7.2 7.2 L6 12 L4.8 7.2 L0 6 L4.8 4.8 Z"
          fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Horizontal data lines on middle cylinder -->
  <line x1="22" y1="31" x2="42" y2="31" stroke="#2d4043" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="33.5" x2="38" y2="33.5" stroke="#2d4043" stroke-width="1" stroke-linecap="round"/>

  <!-- Horizontal data lines on bottom cylinder -->
  <line x1="22" y1="41" x2="42" y2="41" stroke="#2d4043" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="43.5" x2="36" y2="43.5" stroke="#2d4043" stroke-width="1" stroke-linecap="round"/>

  <!-- Accent glow dot on top cylinder rim -->
  <circle cx="38" cy="18" r="2" fill="#00d4a8" opacity="0.8"/>
  <circle cx="38" cy="18" r="4" fill="#00d4a8" opacity="0.15"/>
</svg>
