name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: query
    attributes:
      label: Natural Language Query & Generated Output
      description: Please share the exact prompt you used and the JSON/Error that was returned.
      render: javascript
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider & Model
      description: e.g. OpenAI (gpt-4o-mini), Groq (llama-3.1-8b), Gemini (gemini-2.0-flash)
    validations:
      required: true
